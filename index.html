<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bonk.io</title>

<style>
body {
    margin: 0;
    background: black;
}

#gameFrame {
    width: 100%;
    height: 100vh;
    border: none;
}
</style>
</head>

<body>

<iframe id="gameFrame" src="https://bonk.io"></iframe>

<script>
// fallback if blocked
setTimeout(() => {
    try {
        document.getElementById("gameFrame").contentWindow.location.href;
    } catch {
        window.open("https://bonk.io", "_blank");
    }
}, 1000);
</script>

</body>
</html>
