<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fresh Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    width: 240px;
    height: 100%;
    background: #020617;
    overflow-y: auto;
}

.game-btn {
    padding: 12px;
    margin: 8px;
    background: #0f172a;
    border-radius: 10px;
    cursor: pointer;
}

.game-btn:hover {
    background: #1e293b;
}

/* MAIN */
.main {
    margin-left: 240px;
    margin-right: 300px;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.topbar {
    height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.search {
    width: 70%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #0f172a;
    color: white;
}

/* FRAME */
iframe {
    flex: 1;
    border: none;
}

/* CHAT */
.chat {
    position: fixed;
    right: 0;
    width: 300px;
    height: 100%;
    background: #020617;
    border-left: 1px solid #1e293b;
    display: flex;
    flex-direction: column;
}

.chat-header {
    padding: 10px;
    border-bottom: 1px solid #1e293b;
    font-weight: bold;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    background: #0f172a;
    padding: 6px;
    border-radius: 8px;
    margin-bottom: 6px;
}

.chat-input {
    display: flex;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border: none;
    background: #0f172a;
    color: white;
}

.chat-input button {
    padding: 10px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar"></div>

<!-- MAIN -->
<div class="main">
<div class="topbar">
<input id="search" class="search" placeholder="Search or enter URL...">
</div>
<iframe id="frame"></iframe>
</div>

<!-- CHAT -->
<div class="chat">
    <div class="chat-header">
        💬 Chat (<span id="onlineCount">0</span>)
    </div>

    <div id="chat" class="chat-messages"></div>

    <div class="chat-input">
        <input id="msg" placeholder="Message...">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script>
// GAMES
const games = [
["🔥 Fresh Clicker","games/fresh-clicker.html"],
["Doge Miner","https://dogeminer-online.github.io/file/"],
["Crossy Road","https://crossy-road.com/cross-road.embed"],
["Bonk IO","https://bonk.io"],
["Drift Hunters","https://run-3online.github.io/go/class-447.html"]
];

const sidebar = document.getElementById("sidebar");
const frame = document.getElementById("frame");

// LOAD GAMES
games.forEach(g => {
    const div = document.createElement("div");
    div.className = "game-btn";
    div.innerText = g[0];

    div.onclick = () => {
        frame.src = g[1];
    };

    sidebar.appendChild(div);
});

// SEARCH
document.getElementById("search").addEventListener("keydown", e => {
    if (e.key === "Enter") {
        let val = e.target.value.trim();

        if (val.startsWith("http")) {
            frame.src = val;
        } else if (val.includes(".")) {
            frame.src = "https://" + val;
        } else {
            frame.src = "https://duckduckgo.com/html/?q=" + encodeURIComponent(val);
        }
    }
});
</script>

<!-- 🔥 FIREBASE CHAT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4h3GYyRYw5xu3QJIvlMWJJvIfgkA4ULY",
  authDomain: "fresh-hub-10d5e.firebaseapp.com",
  projectId: "fresh-hub-10d5e",
  storageBucket: "fresh-hub-10d5e.firebasestorage.app",
  messagingSenderId: "19892802679",
  appId: "1:19892802679:web:4776515006c2f49e3f2272",
  measurementId: "G-LCVYR85TC9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chatBox = document.getElementById("chat");
const msgInput = document.getElementById("msg");

// USERNAME
let username = localStorage.getItem("username") || prompt("Enter username:");
localStorage.setItem("username", username);

// SEND
window.sendMsg = async function() {
    let text = msgInput.value.trim();
    if (!text) return;

    await addDoc(collection(db, "messages"), {
        text,
        user: username,
        time: Date.now()
    });

    msgInput.value = "";
};

// RECEIVE
const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, snapshot => {
    chatBox.innerHTML = "";
    document.getElementById("onlineCount").innerText = snapshot.size;

    snapshot.forEach(doc => {
        let data = doc.data();

        let div = document.createElement("div");
        div.className = "msg";

        let time = new Date(data.time).toLocaleTimeString();

        div.innerHTML = `<b>${data.user}</b>: ${data.text}<br><small>${time}</small>`;
        chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
});
</script>

</body>
</html>
