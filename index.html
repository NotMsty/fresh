<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FRESH EMBED!</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 28px;
      background: #1c1c1c;
    }

    .container {
      padding: 20px;
    }

    iframe {
      width: 90%;
      height: 650px;
      border: 2px solid white;
      border-radius: 10px;
      margin-top: 20px;
    }

    .note {
      margin-top: 15px;
      color: #aaa;
      font-size: 14px;
    }

    button {
      padding: 10px 20px;
      margin: 8px;
      border: none;
      background: #2d6cdf;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      background: #1f4fb3;
    }
  </style>
</head>
<body>

<header>
  🎮 FRESH REBORN
</header>

<div class="container">

  <h2>OPEN FRESHYY</h2>

  <button onclick="openGame()">Load Game</button>
  <button onclick="openFullScreen()">Full Screen</button>

  <div id="gameBox"></div>

  <div class="note">
    If the game doesn’t load, the site may block embedding.
    <br>
    FRESH - COPYRIGHT 2026
  </div>

</div>

<script>
function openGame() {
  document.getElementById("gameBox").innerHTML = `
    <iframe id="gameFrame" src="https://bonk.io"></iframe>
  `;
}

function openFullScreen() {
  const iframe = document.getElementById("gameFrame");

  if (!iframe) {
    alert("Load the game first!");
    return;
  }

  if (iframe.requestFullscreen) {
    iframe.requestFullscreen();
  } else if (iframe.webkitRequestFullscreen) {
    iframe.webkitRequestFullscreen();
  } else if (iframe.msRequestFullscreen) {
    iframe.msRequestFullscreen();
  }
}
</script>

</body>
</html>
