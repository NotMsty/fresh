<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator Hub</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Scrollbar */
::-webkit-scrollbar{
    width:8px;
}
::-webkit-scrollbar-thumb{
    background:#8b5cf6;
    border-radius:10px;
}

/* Calculator */
.calc{
    width:320px;
    background:#111;
    border-radius:25px;
    padding:20px;
}

.display{
    width:100%;
    height:80px;
    background:black;
    color:white;
    font-size:40px;
    text-align:right;
    padding:10px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
}

/* Buttons */
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border-radius:50%;
    border:none;
    font-size:20px;
    cursor:pointer;
}

.num{
    background:#333;
    color:white;
}

.op{
    background:orange;
    color:white;
}

.clear{
    background:#aaa;
}

.zero{
    grid-column:span 2;
    border-radius:40px;
    text-align:left;
    padding-left:25px;
}

/* HUB */
#hub,
#admin{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:#020617;
}

.sidebar{
    width:240px;
    height:100%;
    position:fixed;
    background:#020617;
    overflow-y:auto;
    border-right:1px solid #111827;
}

.game-btn{
    padding:12px;
    margin:8px;
    border-radius:10px;
    cursor:pointer;
    background:#111827;
    color:white;
    transition:0.2s;
}

.game-btn:hover{
    background:#1e293b;
}

.main{
    margin-left:240px;
    height:100%;
    display:flex;
    flex-direction:column;
}

.search{
    margin:10px;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#0f172a;
    color:white;
    outline:none;
}

iframe{
    flex:1;
    border:none;
    display:none;
}

/* Home */
#hubPage{
    display:none;
    padding:20px;
    color:white;
}

/* Admin */
.admin-box{
    padding:20px;
    color:white;
}

.admin-box input{
    margin:5px;
    padding:10px;
    width:250px;
    border:none;
    border-radius:8px;
}

.admin-box button{
    margin:5px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- Calculator -->
<div class="calc" id="calc">
<input id="display" class="display" readonly>

<div class="grid">
<button class="clear" onclick="clearDisplay()">C</button>
<button class="clear" onclick="press('/')">÷</button>
<button class="clear" onclick="press('*')">×</button>
<button class="op" onclick="press('-')">−</button>

<button class="num" onclick="press('7')">7</button>
<button class="num" onclick="press('8')">8</button>
<button class="num" onclick="press('9')">9</button>
<button class="op" onclick="press('+')">+</button>

<button class="num" onclick="press('4')">4</button>
<button class="num" onclick="press('5')">5</button>
<button class="num" onclick="press('6')">6</button>
<button disabled style="opacity:0;"></button>

<button class="num" onclick="press('1')">1</button>
<button class="num" onclick="press('2')">2</button>
<button class="num" onclick="press('3')">3</button>
<button class="op" onclick="checkCode()">=</button>

<button class="num zero" onclick="press('0')">0</button>
<button class="num" onclick="press('.')">.</button>
</div>
</div>

<!-- HUB -->
<div id="hub">

<div class="sidebar" id="sidebar"></div>

<div class="main">

<input id="search" class="search" placeholder="Search Google or enter URL...">

<div id="hubPage">
<h1>🔥 Fresh Hub</h1>
<p>Select a game from the sidebar.</p>
</div>

<iframe id="frame"></iframe>

</div>
</div>

<!-- ADMIN -->
<div id="admin">
<div class="admin-box">

<h2>Admin Panel</h2>

<input id="gameName" placeholder="Game name">
<input id="gameURL" placeholder="Game URL">

<br>

<button onclick="addGame()">Add Game</button>
<button onclick="goBack()">Back</button>

</div>
</div>

<script>
const display = document.getElementById("display");
const calc = document.getElementById("calc");
const hub = document.getElementById("hub");
const admin = document.getElementById("admin");
const sidebar = document.getElementById("sidebar");
const frame = document.getElementById("frame");
const hubPage = document.getElementById("hubPage");
const search = document.getElementById("search");
const gameName = document.getElementById("gameName");
const gameURL = document.getElementById("gameURL");

let input = "";

/* Calculator */
function press(v){
    input += v;
    display.value = input;
}

function clearDisplay(){
    input = "";
    display.value = "";
}

function checkCode(){

    if(input === "0000"){
        calc.style.display = "none";
        hub.style.display = "block";
        showHome();
    }

    else if(input === "0109"){
        calc.style.display = "none";
        admin.style.display = "block";
    }

    else{
        try{
            input = eval(input).toString();
            display.value = input;
        }
        catch{
            display.value = "Error";
            input = "";
        }
    }
}

/* Game List */
let defaultGames = [
["Slope","https://slope3.io/"],
["2048","https://play2048.co/"],
["Minesweeper","https://minesweeperonline.com/"],
["Crossy Road","https://crossy-road.com/cross-road.embed"],
["Kart Bros","https://kartbros.io/"],
["Geometry","https://geometrygames.io"],
["Run 3","https://run3.io/"]
];

let games = JSON.parse(localStorage.getItem("games")) || defaultGames;

/* Render */
function renderGames(){

    sidebar.innerHTML = "";

    let home = document.createElement("div");
    home.className = "game-btn";
    home.innerText = "🏠 Home";
    home.onclick = showHome;

    sidebar.appendChild(home);

    games.forEach(g => {

        let d = document.createElement("div");

        d.className = "game-btn";
        d.innerText = g[0];

        d.onclick = () => {
            hubPage.style.display = "none";
            frame.style.display = "block";
            frame.src = g[1];
        };

        sidebar.appendChild(d);
    });
}

function showHome(){
    frame.style.display = "none";
    hubPage.style.display = "block";
}

function addGame(){

    if(!gameName.value || !gameURL.value) return;

    games.push([
        gameName.value,
        gameURL.value
    ]);

    localStorage.setItem(
        "games",
        JSON.stringify(games)
    );

    renderGames();

    gameName.value = "";
    gameURL.value = "";
}

function goBack(){
    admin.style.display = "none";
    calc.style.display = "block";
}

/* Search */
search.addEventListener("keydown", e => {

    if(e.key === "Enter"){

        let v = search.value.trim();

        if(!v) return;

        let url;

        if(v.startsWith("http://") || v.startsWith("https://")){
            url = v;
        }

        else if(v.includes(".")){
            url = "https://" + v;
        }

        else{
            url = "https://www.google.com/search?q=" + encodeURIComponent(v);
        }

        frame.style.display = "block";
        hubPage.style.display = "none";
        frame.src = url;
    }
});

renderGames();
</script>

</body>
</html>
