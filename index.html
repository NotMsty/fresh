<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Msty Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0a0f1c, #000);
    color: white;
    text-align: center;
}

/* HEADER */
.header {
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    color: #00aaff;
}

/* SEARCH BAR */
.search-container {
    margin: 20px;
}

.search-bar {
    width: 60%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    outline: none;
    font-size: 16px;
    background: #111;
    color: white;
}

/* GAMES GRID */
.games {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.game {
    background: #111;
    border-radius: 15px;
    padding: 10px;
    transition: 0.2s;
    cursor: pointer;
}

.game:hover {
    transform: scale(1.05);
    background: #1a1a1a;
}

.game img {
    width: 100%;
    border-radius: 10px;
}

.game-title {
    margin-top: 10px;
}

/* EMBED */
iframe {
    width: 100%;
    height: 500px;
    border: none;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">🔥 Welcome to Msty Hub 🔥</div>

<div class="search-container">
    <input 
        type="text" 
        id="searchInput" 
        class="search-bar" 
        placeholder="Search games..."
        onkeyup="searchGames()"
    >
</div>

<div class="games" id="gameList">

    <div class="game" data-name="bonk io" onclick="loadGame('https://bonk.io/')">
        <img src="https://bonk.io/img/bonkio-logo.png">
        <div class="game-title">Bonk.io</div>
    </div>

    <div class="game" data-name="tunnel rush" onclick="loadGame('https://tunnelrush.io/')">
        <img src="https://tunnelrush.io/data/image/game.png">
        <div class="game-title">Tunnel Rush</div>
    </div>

    <div class="game" data-name="run 3" onclick="loadGame('https://run3.io/')">
        <img src="https://run3.io/data/image/game.png">
        <div class="game-title">Run 3</div>
    </div>

</div>

<div id="gameFrame"></div>

<script>
function searchGames() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let games = document.getElementsByClassName("game");

    for (let i = 0; i < games.length; i++) {
        let name = games[i].getAttribute("data-name");
        if (name.includes(input)) {
            games[i].style.display = "block";
        } else {
            games[i].style.display = "none";
        }
    }
}

function loadGame(url) {
    document.getElementById("gameFrame").innerHTML = `
        <iframe src="${url}"></iframe>
    `;
}
</script>

</body>
</html>
