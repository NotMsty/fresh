<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Fresh Hub</title>
<link rel="icon" href="ixl.png">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
}

/* Sidebar */
.sidebar {
    position: fixed;
    width: 260px;
    height: 100%;
    background: #020617;
    overflow-y: auto;
}

/* Sections */
.section-title {
    margin: 15px;
    font-size: 14px;
    color: #64748b;
}

/* Game buttons */
.game-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px;
    margin: 8px;
    border-radius: 12px;
    background: #0f172a;
    cursor: pointer;
    transition: 0.2s;
}

.game-btn:hover {
    background: #1e293b;
}

.left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.star {
    cursor: pointer;
}

/* Main */
.main {
    margin-left: 260px;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.topbar {
    height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 1px solid #1e293b;
}

.search {
    width: 60%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #0f172a;
    color: white;
}

.home {
    text-align: center;
    padding-top: 40px;
}

iframe {
    flex: 1;
    border: none;
    display: none;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="main">
<div class="topbar">
<input class="search" id="search" placeholder="Search games...">
</div>

<div id="home" class="home">
<h1>🔥 Fresh Hub</h1>
<p>Play anything. Fast.</p>
</div>

<iframe id="frame"></iframe>
</div>

<script>
let games = [
{ name:"🔥 Fresh Clicker", url:"games/fresh-clicker.html", category:"Clicker" },

{ name:"Doge Miner", url:"https://dogeminer-online.github.io/file/", category:"Clicker" },
{ name:"Tung Tung Clicker", url:"https://www.tungsahurclicker.com/", category:"Clicker" },

{ name:"Bonk IO", url:"https://bonk.io", category:"IO" },
{ name:"Hitbox IO", url:"https://hitbox.io", category:"IO" },

{ name:"Crossy Road", url:"https://crossy-road.com/cross-road.embed", category:"Arcade" },
{ name:"Flappy Dunk", url:"https://flappydunk.flappydunk.co/Flappy%20Dunk.html", category:"Arcade" },

{ name:"Drift Hunters", url:"https://run-3online.github.io/go/class-447.html", category:"Driving" },
{ name:"Madalin Cars", url:"https://run-3online.github.io/go/class-566.html", category:"Driving" }
];

let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
let recent = JSON.parse(localStorage.getItem("recent") || "[]");

const sidebar = document.getElementById("sidebar");
const frame = document.getElementById("frame");
const home = document.getElementById("home");
const search = document.getElementById("search");

// LOAD GAME
function loadGame(game) {
    home.style.display = "none";
    frame.style.display = "block";
    frame.src = game.url;

    localStorage.setItem("lastGame", game.url);

    recent = [game.name, ...recent.filter(g => g !== game.name)].slice(0,5);
    localStorage.setItem("recent", JSON.stringify(recent));

    render();
}

// FAVORITE TOGGLE
function toggleFav(name) {
    if (favorites.includes(name)) {
        favorites = favorites.filter(f => f !== name);
    } else {
        favorites.push(name);
    }
    localStorage.setItem("favorites", JSON.stringify(favorites));
    render();
}

// RENDER
function render() {
    sidebar.innerHTML = "";

    // FAVORITES
    if (favorites.length) {
        sidebar.innerHTML += `<div class="section-title">⭐ Favorites</div>`;
        games.filter(g => favorites.includes(g.name)).forEach(createBtn);
    }

    // RECENT
    if (recent.length) {
        sidebar.innerHTML += `<div class="section-title">🕒 Recent</div>`;
        games.filter(g => recent.includes(g.name)).forEach(createBtn);
    }

    // ALL
    sidebar.innerHTML += `<div class="section-title">🎮 All Games</div>`;
    games.forEach(createBtn);
}

// CREATE BUTTON
function createBtn(game) {
    const div = document.createElement("div");
    div.className = "game-btn";

    div.innerHTML = `
        <div class="left">
            <img src="pfp.png" width="30">
            ${game.name}
        </div>
        <div class="star">${favorites.includes(game.name) ? "⭐" : "☆"}</div>
    `;

    div.onclick = () => loadGame(game);

    div.querySelector(".star").onclick = (e) => {
        e.stopPropagation();
        toggleFav(game.name);
    };

    sidebar.appendChild(div);
}

// SEARCH FILTER
search.addEventListener("input", () => {
    let val = search.value.toLowerCase();
    sidebar.innerHTML = "";

    games
        .filter(g => g.name.toLowerCase().includes(val))
        .forEach(createBtn);
});

// LOAD LAST GAME
let last = localStorage.getItem("lastGame");
if (last) {
    frame.src = last;
    frame.style.display = "block";
    home.style.display = "none";
}

render();
</script>

</body>
</html>
