<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>IXL | Math, Language Arts, Science, Social Studies</title>
<link rel="icon" href="ixl.png">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f172a, #000);
    color: white;
}

/* Sidebar */
.sidebar {
    position: fixed;
    width: 250px;
    height: 100%;
    background: #020617;
    overflow-y: scroll;
    border-right: 1px solid #1e293b;
}

.game-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    margin: 8px;
    border-radius: 10px;
    background: #0f172a;
    cursor: pointer;
}

.game-btn:hover {
    background: #1e293b;
    transform: scale(1.05);
}

.game-btn img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

/* Main */
.main {
    margin-left: 250px;
    height: 100vh;
    position: relative;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
}

/* Home */
.home {
    padding: 40px;
}

.title {
    font-size: 50px;
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    -webkit-background-clip: text;
    color: transparent;
}

.subtitle {
    color: #94a3b8;
    margin-top: 10px;
}

/* Cards */
.grid {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
}

.card {
    background: #0f172a;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
    background: #1e293b;
}

/* Loading */
#loading {
    position: absolute;
    top: 50%;
    left: 60%;
    transform: translate(-50%, -50%);
    display: none;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="main">

<div id="home" class="home">
    <div class="title">🍕 Fresh Games</div>
    <div class="subtitle">Play tons of unblocked games instantly.</div>

    <div class="grid">
        <div class="card" onclick="loadGame('https://bonk.io')">Bonk.io</div>
        <div class="card" onclick="loadGame('https://run-3online.github.io')">Run 3</div>
        <div class="card" onclick="loadGame('https://slope3.io/')">Slope</div>
        <div class="card" onclick="loadGame('https://crossy-road.com/cross-road.embed')">Crossy Road</div>
    </div>
</div>

<iframe id="frame"></iframe>
<div id="loading">Loading...</div>

</div>

<script>
const games = [
["Doge Miner","https://dogeminer-online.github.io/file/"],
["Kart Bros","https://kartbros.io/"],
["Tung Tung Clicker","https://www.tungsahurclicker.com/"],
["Crossy Road","https://crossy-road.com/cross-road.embed"],
["Infinite Craft","https://infinite-craft.gg/"],
["Pretty Good Games","https://newunblockedgames.gitlab.io/"],
["Eaglercraft","https://eaglercraft-orcin.vercel.app/"],
["Bonk IO","https://bonk.io"],
["Hitbox IO","https://hitbox.io"],
["Flappy Dunk","https://flappydunk.flappydunk.co/Flappy%20Dunk.html"],
["Block Blast","https://blockblast.game/game"],
["AZ Games","https://azgames.io/"],
["Geo Dash Spam","https://geometrydashspam.io/"],
["Geometry Games","https://geometrygames.io"],
["Drift Hunters","https://run-3online.github.io/go/class-447.html"],
["Car Climb Racing","https://run-3online.github.io/go/class-785.html"],
["Madalin Stunt Cars 3","https://run-3online.github.io/go/class-566.html"],
["Earn to Die","https://run-3online.github.io/go/class-523.html"],
["Super Racing GT","https://run-3online.github.io/go/class-705.html"],
["3D Car Simulator","https://sudoku-online.github.io/a2/3d-car-simulator/"],
["Unblocked Games 66","https://unblockedgames66.io/"],
["Run 3","https://run-3online.github.io"],
["Bee Swarm Simulator","https://dddatt.github.io/bss/"],
["Elastic Face","https://quiz-50.github.io/casual-games/elastic-face/"],
["Tag","https://quiz-50.github.io/action-games/tag"],
["Nut Simulator","https://quiz-50.github.io/casual-games/nut-simulator/"],
["Cluster Rush","https://quiz-50.github.io/driving-games/cluster-rush/"],
["Baldi's Basics","https://quiz-50.github.io/casual-games/baldis-basics/"],
["FNAF 2","https://fngames.io/five-nights-at-freddys-2.embed"],
["Slap Jack","https://slapjack.thirdwavesoft.com/"],
["Slope V3","https://slope3.io/"],
["Minecraft Packs","https://resourcepack.net/"],
["Class 76","https://class-76.github.io/"],
["MC Skins","https://mcskins.org/"]
];

const sidebar = document.getElementById("sidebar");

games.forEach(game => {
    const btn = document.createElement("div");
    btn.className = "game-btn";
    btn.onclick = () => loadGame(game[1]);
    btn.innerHTML = `<img src="pfp.png"><span>${game[0]}</span>`;
    sidebar.appendChild(btn);
});

function loadGame(url) {
    document.getElementById("home").style.display = "none";
    document.getElementById("frame").style.display = "block";
    document.getElementById("loading").style.display = "block";

    document.getElementById("frame").src = url;

    setTimeout(() => {
        try {
            frame.contentWindow.location.href;
            document.getElementById("loading").style.display = "none";
        } catch {
            window.location.replace(url);
        }
    }, 1200);
}
</script>

</body>
</html>
