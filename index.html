<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>IXL | Math, Language Arts, Science, Social Studies</title>
<link rel="icon" href="ixl.png">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
    overflow: hidden;
}

/* REMOVE WHITE SCROLLBAR */
::-webkit-scrollbar {
    width: 8px;
}
::-webkit-scrollbar-track {
    background: #020617;
}
::-webkit-scrollbar-thumb {
    background: #1e293b;
    border-radius: 10px;
}

/* Sidebar */
.sidebar {
    position: fixed;
    width: 260px;
    height: 100%;
    background: #020617;
    overflow-y: auto;
}

/* Search */
.search, .browser {
    margin: 10px;
    padding: 10px;
    width: calc(100% - 20px);
    border-radius: 8px;
    border: none;
    background: #0f172a;
    color: white;
}

/* Game Button */
.game-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    margin: 8px;
    border-radius: 12px;
    background: #0f172a;
    cursor: pointer;
    transition: 0.2s;
    user-select: none;
}

.game-btn:hover {
    background: #1e293b;
    transform: scale(1.03);
}

.game-btn img {
    width: 35px;
    height: 35px;
    border-radius: 50%;
}

/* Main */
.main {
    margin-left: 260px;
    height: 100vh;
    position: relative;
}

/* Frame */
iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* Top browser bar */
.browser-bar {
    position: absolute;
    top: 0;
    left: 260px;
    right: 0;
    height: 50px;
    background: #020617;
    display: flex;
    align-items: center;
    padding: 0 10px;
    z-index: 10;
}

.browser {
    flex: 1;
}

/* Frame offset */
.frame-container {
    position: absolute;
    top: 50px;
    left: 0;
    right: 0;
    bottom: 0;
}
</style>
</head>

<body>

<div class="sidebar">
    <input class="search" id="search" placeholder="Search games...">
    <div id="sidebar"></div>
</div>

<!-- 🔥 BROWSER BAR -->
<div class="browser-bar">
    <input class="browser" id="browserInput" placeholder="Search Google or type URL...">
</div>

<div class="main">
    <div class="frame-container">
        <iframe id="frame"></iframe>
    </div>
</div>

<script>
const games = [
["Doge Miner","https://dogeminer-online.github.io/file/"],
["Kart Bros","https://kartbros.io/"],
["Tung Tung Clicker","https://www.tungsahurclicker.com/"],
["Crossy Road","https://crossy-road.com/cross-road.embed"],
["Infinite Craft","https://infinite-craft.gg/"],
["Pretty Good Games","https://newunblockedgames.gitlab.io/"],
["Eaglercraft","https://eaglercraft-orcin.vercel.app/"],
["Bonk IO","https://bonk.io"],
["Hitbox IO","https://hitbox.io"],
["Flappy Dunk","https://flappydunk.flappydunk.co/Flappy%20Dunk.html"],
["Block Blast","https://blockblast.game/game"],
["AZ Games","https://azgames.io/"],
["Geo Dash Spam","https://geometrydashspam.io/"],
["Geometry Games","https://geometrygames.io"],
["Drift Hunters","https://run-3online.github.io/go/class-447.html"],
["Car Climb Racing","https://run-3online.github.io/go/class-785.html"],
["Madalin Stunt Cars 3","https://run-3online.github.io/go/class-566.html"],
["Earn to Die","https://run-3online.github.io/go/class-523.html"],
["Super Racing GT","https://run-3online.github.io/go/class-705.html"],
["3D Car Simulator","https://sudoku-online.github.io/a2/3d-car-simulator/"],
["Unblocked Games 66","https://unblockedgames66.io/"],
["Run 3","https://run-3online.github.io"],
["Bee Swarm Simulator","https://dddatt.github.io/bss/"],
["Elastic Face","https://quiz-50.github.io/casual-games/elastic-face/"],
["Tag","https://quiz-50.github.io/action-games/tag"],
["Nut Simulator","https://quiz-50.github.io/casual-games/nut-simulator/"],
["Cluster Rush","https://quiz-50.github.io/driving-games/cluster-rush/"],
["Baldi's Basics","https://quiz-50.github.io/casual-games/baldis-basics/"],
["FNAF 2","https://fngames.io/five-nights-at-freddys-2.embed"],
["Slap Jack","https://slapjack.thirdwavesoft.com/"],
["Slope V3","https://slope3.io/"],
["Minecraft Packs","https://resourcepack.net/"],
["Class 76","https://class-76.github.io/"],
["MC Skins","https://mcskins.org/"]
];

const sidebar = document.getElementById("sidebar");
const search = document.getElementById("search");
const frame = document.getElementById("frame");

// Render games
function render(filter="") {
    sidebar.innerHTML = "";

    games.filter(g => g[0].toLowerCase().includes(filter.toLowerCase()))
    .forEach(game => {
        const div = document.createElement("div");
        div.className = "game-btn";

        div.innerHTML = `
            <img src="pfp.png">
            <span>${game[0]}</span>
        `;

        div.onclick = () => frame.src = game[1];

        sidebar.appendChild(div);
    });
}

search.oninput = () => render(search.value);

// 🔥 BROWSER SEARCH SYSTEM
document.getElementById("browserInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        let input = this.value.trim();

        if (input.startsWith("http")) {
            frame.src = input;
        } else if (input.includes(".")) {
            frame.src = "https://" + input;
        } else {
            frame.src = "https://www.google.com/search?q=" + encodeURIComponent(input);
        }
    }
});

render();
</script>

</body>
</html>
