<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>IXL | Math, Language Arts, Science, Social Studies</title>
<link rel="icon" href="ixl.png">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f172a, #000);
    color: white;
    overflow: hidden;
}

/* Sidebar */
.sidebar {
    position: fixed;
    width: 260px;
    height: 100%;
    background: #020617;
    overflow-y: auto;
    border-right: 1px solid #1e293b;
    animation: slideIn 0.5s ease;
}

/* Search */
.search {
    margin: 10px;
    padding: 10px;
    width: calc(100% - 20px);
    border-radius: 8px;
    border: none;
    background: #0f172a;
    color: white;
}

/* Buttons */
.game-btn {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    margin: 6px;
    border-radius: 10px;
    background: #0f172a;
    cursor: pointer;
    transition: 0.2s;
}

.game-btn:hover {
    background: #1e293b;
    transform: scale(1.03);
}

.left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.game-btn img {
    width: 35px;
    height: 35px;
    border-radius: 50%;
}

/* Star */
.star {
    cursor: pointer;
    font-size: 18px;
}

/* Main */
.main {
    margin-left: 260px;
    height: 100vh;
    position: relative;
}

/* Frame */
iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
    animation: fadeIn 0.5s ease;
}

/* Home */
.home {
    padding: 40px;
    animation: fadeIn 0.5s ease;
}

.title {
    font-size: 48px;
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    -webkit-background-clip: text;
    color: transparent;
}

/* Grid */
.grid {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
}

.card {
    background: #0f172a;
    padding: 20px;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
    background: #1e293b;
}

/* Loading */
#loading {
    position: absolute;
    top: 50%;
    left: 60%;
    transform: translate(-50%, -50%);
    display: none;
}

/* Animations */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideIn {
    from {transform: translateX(-100%);}
    to {transform: translateX(0);}
}
</style>
</head>

<body>

<div class="sidebar">
    <input class="search" id="search" placeholder="Search games...">
    <div id="sidebar"></div>
</div>

<div class="main">
    <div id="home" class="home">
        <div class="title">🔥 Fresh Games</div>
        <p>Play and save your favorite games instantly.</p>

        <div class="grid" id="favoritesGrid"></div>
    </div>

    <iframe id="frame"></iframe>
    <div id="loading">Loading...</div>
</div>

<script>
const games = [
["Doge Miner","https://dogeminer-online.github.io/file/"],
["Kart Bros","https://kartbros.io/"],
["Crossy Road","https://crossy-road.com/cross-road.embed"],
["Bonk IO","https://bonk.io"],
["Run 3","https://run-3online.github.io"],
["Slope","https://slope3.io/"],
["Cluster Rush","https://quiz-50.github.io/driving-games/cluster-rush/"],
["Baldi's Basics","https://quiz-50.github.io/casual-games/baldis-basics/"],
["FNAF 2","https://fngames.io/five-nights-at-freddys-2.embed"]
];

let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

const sidebar = document.getElementById("sidebar");
const search = document.getElementById("search");
const favGrid = document.getElementById("favoritesGrid");

function renderGames(filter="") {
    sidebar.innerHTML = "";

    games.filter(g => g[0].toLowerCase().includes(filter.toLowerCase()))
    .forEach(game => {
        const div = document.createElement("div");
        div.className = "game-btn";

        const isFav = favorites.includes(game[0]);

        div.innerHTML = `
            <div class="left">
                <img src="pfp.png">
                <span>${game[0]}</span>
            </div>
            <div class="star">${isFav ? "⭐" : "☆"}</div>
        `;

        div.onclick = () => loadGame(game[1]);

        div.querySelector(".star").onclick = (e) => {
            e.stopPropagation();
            toggleFavorite(game[0]);
        };

        sidebar.appendChild(div);
    });
}

function toggleFavorite(name) {
    if (favorites.includes(name)) {
        favorites = favorites.filter(f => f !== name);
    } else {
        favorites.push(name);
    }
    localStorage.setItem("favorites", JSON.stringify(favorites));
    renderGames(search.value);
    renderFavorites();
}

function renderFavorites() {
    favGrid.innerHTML = "";
    games.filter(g => favorites.includes(g[0])).forEach(game => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerText = game[0];
        card.onclick = () => loadGame(game[1]);
        favGrid.appendChild(card);
    });
}

search.addEventListener("input", () => renderGames(search.value));

function loadGame(url) {
    document.getElementById("home").style.display = "none";
    const frame = document.getElementById("frame");
    const loading = document.getElementById("loading");

    frame.style.display = "block";
    loading.style.display = "block";

    frame.src = url;

    setTimeout(() => loading.style.display = "none", 1500);
}

renderGames();
renderFavorites();
</script>

</body>
</html>
