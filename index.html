<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>IXL | Math, Language Arts, Science, Social Studies</title>
<link rel="icon" href="ixl.png">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
}

/* Scrollbar fix */
::-webkit-scrollbar {
    width: 8px;
}
::-webkit-scrollbar-track {
    background: #020617;
}
::-webkit-scrollbar-thumb {
    background: #1e293b;
}

/* Sidebar */
.sidebar {
    position: fixed;
    width: 260px;
    height: 100%;
    background: #020617;
    overflow-y: auto;
}

/* Game buttons */
.game-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    margin: 8px;
    border-radius: 12px;
    background: #0f172a;
    cursor: pointer;
}

.game-btn:hover {
    background: #1e293b;
}

.game-btn img {
    width: 35px;
    height: 35px;
    border-radius: 50%;
}

/* Main */
.main {
    margin-left: 260px;
    height: 100vh;
    position: relative;
}

/* TOP SEARCH BAR */
.topbar {
    height: 70px;
    background: #020617;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid #1e293b;
}

.search {
    width: 60%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #0f172a;
    color: white;
    font-size: 16px;
}

/* HOME HUB */
.home {
    text-align: center;
    padding-top: 40px;
}

.title {
    font-size: 48px;
    font-weight: bold;
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    -webkit-background-clip: text;
    color: transparent;
}

.desc {
    margin-top: 10px;
    color: #94a3b8;
}

/* Frame */
iframe {
    width: 100%;
    height: calc(100% - 70px);
    border: none;
    display: none;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="main">

<!-- 🔥 TOP SEARCH -->
<div class="topbar">
    <input class="search" id="browserSearch" placeholder="Search the web or type a URL...">
</div>

<!-- 🔥 HOME HUB -->
<div id="home" class="home">
    <div class="title">🔥 Welcome to Fresh</div>
    <div class="desc">
        This is your game hub. Play unblocked games, search anything, and chill.
    </div>
</div>

<!-- GAME FRAME -->
<iframe id="frame"></iframe>

</div>

<script>
const games = [
["Doge Miner","https://dogeminer-online.github.io/file/"],
["Kart Bros","https://kartbros.io/"],
["Tung Tung Clicker","https://www.tungsahurclicker.com/"],
["Crossy Road","https://crossy-road.com/cross-road.embed"],
["Infinite Craft","https://infinite-craft.gg/"],
["Pretty Good Games","https://newunblockedgames.gitlab.io/"],
["Eaglercraft","https://eaglercraft-orcin.vercel.app/"],
["Bonk IO","https://bonk.io"],
["Hitbox IO","https://hitbox.io"],
["Flappy Dunk","https://flappydunk.flappydunk.co/Flappy%20Dunk.html"],
["Block Blast","https://blockblast.game/game"],
["AZ Games","https://azgames.io/"],
["Geo Dash Spam","https://geometrydashspam.io/"],
["Geometry Games","https://geometrygames.io"],
["Drift Hunters","https://run-3online.github.io/go/class-447.html"],
["Car Climb Racing","https://run-3online.github.io/go/class-785.html"],
["Madalin Stunt Cars 3","https://run-3online.github.io/go/class-566.html"],
["Earn to Die","https://run-3online.github.io/go/class-523.html"],
["Super Racing GT","https://run-3online.github.io/go/class-705.html"],
["3D Car Simulator","https://sudoku-online.github.io/a2/3d-car-simulator/"],
["Unblocked Games 66","https://unblockedgames66.io/"],
["Run 3","https://run-3online.github.io"],
["Bee Swarm Simulator","https://dddatt.github.io/bss/"],
["Elastic Face","https://quiz-50.github.io/casual-games/elastic-face/"],
["Tag","https://quiz-50.github.io/action-games/tag"],
["Nut Simulator","https://quiz-50.github.io/casual-games/nut-simulator/"],
["Cluster Rush","https://quiz-50.github.io/driving-games/cluster-rush/"],
["Baldi's Basics","https://quiz-50.github.io/casual-games/baldis-basics/"],
["FNAF 2","https://fngames.io/five-nights-at-freddys-2.embed"],
["Slap Jack","https://slapjack.thirdwavesoft.com/"],
["Slope V3","https://slope3.io/"],
["Minecraft Packs","https://resourcepack.net/"],
["Class 76","https://class-76.github.io/"],
["MC Skins","https://mcskins.org/"]
];

const sidebar = document.getElementById("sidebar");
const frame = document.getElementById("frame");
const home = document.getElementById("home");

// Render buttons
games.forEach(game => {
    const div = document.createElement("div");
    div.className = "game-btn";

    div.innerHTML = `
        <img src="pfp.png">
        <span>${game[0]}</span>
    `;

    div.onclick = () => {
        home.style.display = "none";
        frame.style.display = "block";
        frame.src = game[1];
    };

    sidebar.appendChild(div);
});

// 🔥 WORKING SEARCH BAR
document.getElementById("browserSearch").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        let input = this.value.trim();

        home.style.display = "none";
        frame.style.display = "block";

        if (input.startsWith("http")) {
            frame.src = input;
        } else if (input.includes(".")) {
            frame.src = "https://" + input;
        } else {
            frame.src = "https://www.google.com/search?q=" + encodeURIComponent(input);
        }
    }
});
</script>

</body>
</html>
